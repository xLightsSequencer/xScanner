name: Linux Manual Build
on:
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: 'true'
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install g++ gcc build-essential libgtk-3-dev libunwind-dev libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev freeglut3-dev libcurl4-openssl-dev libexpat1-dev libwebp-dev cbp2make
      - name: Make
        run: make -j $(nproc)

      - uses: actions/upload-artifact@v4
        with:
          name: xScanner_Linux
          path: 'bin/xScanner'
